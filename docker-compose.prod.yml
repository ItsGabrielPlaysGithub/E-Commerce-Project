version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    depends_on:
      - backend
    networks:
      - internal_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - internal_network

  db:
    image: mysql:8
    container_name: ecomm-project-db-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yoruyoru
      MYSQL_DATABASE: ecommerce_project_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal_network
    # Optional: uncomment only if you need external DB access
    # ports:
    #   - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  db_data:

networks:
  internal_network:
    driver: bridge