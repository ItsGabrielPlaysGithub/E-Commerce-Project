version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_IMAGE_PATH: ${NEXT_PUBLIC_IMAGE_PATH}
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_IMAGE_PATH: ${NEXT_PUBLIC_IMAGE_PATH}
    ports:
      - "127.0.0.1:3000:3000"  # bind only to localhost
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - omega-ecommerce_default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNC: "false"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_ENABLED: ${MAIL_ENABLED}
      MAIL_FROM: ${MAIL_FROM}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      PAYMONGO_PUBLIC_KEY: ${PAYMONGO_PUBLIC_KEY}
      PAYMONGO_SECRET_KEY: ${PAYMONGO_SECRET_KEY}
      PAYMONGO_API_URL: ${PAYMONGO_API_URL}
      PAYMONGO_CHECKOUT_SUCCESS_URL: ${PAYMONGO_CHECKOUT_SUCCESS_URL}
      PAYMONGO_CHECKOUT_FAILED_URL: ${PAYMONGO_CHECKOUT_FAILED_URL}
    ports:
      - "127.0.0.1:4000:4000"  # bind only to localhost
    volumes:
      - ${UPLOADS_DIR:-/var/lib/omega/uploads}:/app/uploads
    restart: unless-stopped
    networks:
      - omega-ecommerce_default

networks:
  omega-ecommerce_default:
    external: true