services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  db:
    image: mysql:8
    container_name: ecomm-project-db-1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yoruyoru
      MYSQL_DATABASE: ecommerce_project_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"   # use default 3306
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  db_data:
